<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Lexware Bookkeeping</title>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
  <div id="view-login" style="display:flex;position:fixed;top:0;right:0;bottom:0;left:0;background:var(--bg);z-index:9999;align-items:center;justify-content:center">
    <div style="width:360px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:40px">
      <div style="font-size:20px;font-weight:700;color:var(--accent);margin-bottom:8px">Buchführung</div>
      <div style="color:var(--text-muted);font-size:13px;margin-bottom:28px">Bitte anmelden, um fortzufahren.</div>
      <label style="display:block;margin-bottom:16px">
        <span style="font-size:12px;color:var(--text-muted);display:block;margin-bottom:6px">E-Mail</span>
        <input id="login-email" type="email" autocomplete="username" placeholder="name@firma.de"
          style="width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:6px;font-size:14px">
      </label>
      <label style="display:block;margin-bottom:24px">
        <span style="font-size:12px;color:var(--text-muted);display:block;margin-bottom:6px">Passwort</span>
        <input id="login-password" type="password" autocomplete="current-password"
          style="width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:6px;font-size:14px">
      </label>
      <div id="login-error" style="display:none;color:var(--red);font-size:12px;margin-bottom:16px"></div>
      <button id="login-btn" class="btn btn-primary" style="width:100%;justify-content:center;padding:10px">Anmelden</button>
    </div>
  </div>
  <div id="sidebar">
    <div class="logo">Buchführung</div>
    <nav>
      <a href="#queue" class="nav-link active">Queue</a>
      <a href="#review" class="nav-link">Prüfen</a>
      <a href="#reconciliation" class="nav-link">Abstimmen</a>
      <a href="#settings" class="nav-link">Einstellungen</a>
    </nav>
    <div style="margin-top:auto;padding:16px">
      <button id="logout-btn" class="btn btn-secondary btn-sm" style="width:100%;justify-content:center">Abmelden</button>
    </div>
  </div>
  <div id="main">
    <div id="gmail-error-banner"></div>
    <div id="view-queue"></div>
    <div id="view-review" style="display:none"></div>
    <div id="view-reconciliation" style="display:none"></div>
    <div id="view-settings" style="display:none"></div>
  </div>
  <div id="toast"></div>
  <script src="/js/app.js"></script>
  <script src="/js/queue.js"></script>
  <script src="/js/review.js"></script>
  <script src="/js/reconciliation.js"></script>
  <script src="/js/settings.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>
</body>
</html>
